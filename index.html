<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gastos">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<title>Gastos Personales</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#eeede9;
  --text:#111;--text2:#666660;--text3:#99998;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --accent:#111;--accent-fg:#fff;
  --hogar:#185FA5;--hogar-bg:#E6F1FB;
  --autos:#854F0B;--autos-bg:#FAEEDA;
  --hijos:#0F6E56;--hijos-bg:#E1F5EE;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --radius:14px;--radius-sm:9px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--surface:#1c1c1e;--surface2:#242428;
  --text:#f0efe9;--text2:#99998;--text3:#66665f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --hogar-bg:#0c2a47;--autos-bg:#3a2000;--hijos-bg:#0a2b22;--purple-bg:#1e1a4a;
  --red-bg:#3a0a0a;--green-bg:#0f2a04;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;}

/* TOPBAR */
.topbar{background:var(--bg);padding:calc(var(--safe-top) + 4px) 20px 10px;border-bottom:.5px solid var(--border);flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:20px;font-weight:500;letter-spacing:-.3px;}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px;}

/* NUCLEO TABS */
.nucleo-bar{display:flex;gap:6px;padding:10px 16px;background:var(--bg);border-bottom:.5px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.nucleo-bar::-webkit-scrollbar{display:none;}
.nucleo-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .15s;}
.nucleo-chip.hogar{background:var(--hogar-bg);color:var(--hogar);}
.nucleo-chip.hogar.active{background:var(--hogar);color:#fff;}
.nucleo-chip.autos{background:var(--autos-bg);color:var(--autos);}
.nucleo-chip.autos.active{background:var(--autos);color:#fff;}
.nucleo-chip.hijos{background:var(--hijos-bg);color:var(--hijos);}
.nucleo-chip.hijos.active{background:var(--hijos);color:#fff;}
.nucleo-chip.todos{background:var(--surface2);color:var(--text2);}
.nucleo-chip.todos.active{background:var(--accent);color:#fff;}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--safe-bottom) + 74px);}
.section{display:none;}
.section.active{display:block;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* NAVBAR */
.navbar{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:50;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 6px;gap:3px;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:10px;cursor:pointer;transition:color .15s;}
.nav-btn.active{color:var(--accent);font-weight:500;}
.nav-icon{font-size:19px;line-height:1;}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:.5px solid var(--border);padding:14px;margin-bottom:10px;}
.card-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}

/* METRICS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.metric{background:var(--surface);border-radius:var(--radius);border:.5px solid var(--border);padding:13px;}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.metric-value{font-size:17px;font-weight:500;font-family:var(--mono);letter-spacing:-.5px;}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.metric-value.hogar{color:var(--hogar);}
.metric-value.autos{color:var(--autos);}
.metric-value.hijos{color:var(--hijos);}
.metric-value.danger{color:var(--red);}
.metric-value.success{color:var(--green);}

/* NUCLEO SUMMARY CARDS */
.nucleo-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.nucleo-card{border-radius:var(--radius-sm);padding:12px 10px;text-align:center;}
.nucleo-card.hogar{background:var(--hogar-bg);}
.nucleo-card.autos{background:var(--autos-bg);}
.nucleo-card.hijos{background:var(--hijos-bg);}
.nucleo-card-label{font-size:10px;font-weight:500;margin-bottom:4px;}
.nucleo-card.hogar .nucleo-card-label{color:var(--hogar);}
.nucleo-card.autos .nucleo-card-label{color:var(--autos);}
.nucleo-card.hijos .nucleo-card-label{color:var(--hijos);}
.nucleo-card-value{font-size:13px;font-weight:500;font-family:var(--mono);}
.nucleo-card.hogar .nucleo-card-value{color:var(--hogar);}
.nucleo-card.autos .nucleo-card-value{color:var(--autos);}
.nucleo-card.hijos .nucleo-card-value{color:var(--hijos);}

/* ITEMS */
.item-list{display:flex;flex-direction:column;gap:7px;}
.item{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--radius-sm);border:.5px solid var(--border);padding:11px 12px;}
.item-icon{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.item-amount{font-size:13px;font-weight:500;font-family:var(--mono);}
.item-actions{display:flex;gap:4px;margin-top:3px;}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;}
.badge-pending{background:var(--autos-bg);color:var(--autos);}
.badge-paid{background:var(--green-bg);color:var(--green);}
.badge-overdue{background:var(--red-bg);color:var(--red);}
.badge-hogar{background:var(--hogar-bg);color:var(--hogar);}
.badge-autos{background:var(--autos-bg);color:var(--autos);}
.badge-hijos{background:var(--hijos-bg);color:var(--hijos);}

/* BUTTONS */
.btn{padding:7px 14px;font-size:13px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text);cursor:pointer;font-family:var(--font);}
.btn:active{opacity:.7;}
.btn-primary{background:var(--accent);color:var(--accent-fg);border-color:transparent;font-weight:500;}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{color:var(--red);border-color:rgba(160,45,45,.3);}
.btn-full{width:100%;text-align:center;padding:13px;font-size:15px;border-radius:var(--radius);}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{flex:1;text-align:center;}

/* CHART */
.chart-wrap{position:relative;width:100%;height:170px;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-month{font-size:15px;font-weight:500;}
.cal-arrow{background:none;border:.5px solid var(--border2);border-radius:var(--radius-sm);width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:3px 0;font-weight:500;}
.cal-day{min-height:46px;border-radius:var(--radius-sm);border:.5px solid var(--border);padding:4px;background:var(--surface);}
.cal-day.empty{background:none;border-color:transparent;}
.cal-day.today{border-color:var(--accent);}
.cal-day.has-items{cursor:pointer;}
.cal-day.has-items:active{opacity:.7;}
.cal-day-num{font-size:10px;color:var(--text3);margin-bottom:2px;}
.cal-day.today .cal-day-num{font-weight:600;color:var(--text);}
.cal-dot{font-size:8px;padding:1px 3px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;}
.cal-dot.hogar{background:var(--hogar-bg);color:var(--hogar);}
.cal-dot.autos{background:var(--autos-bg);color:var(--autos);}
.cal-dot.hijos{background:var(--hijos-bg);color:var(--hijos);}
.cal-dot.pagado{opacity:.4;text-decoration:line-through;}
.cal-detail{margin-top:10px;}
.cal-detail-label{font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:500;}

/* ANNUAL */
.annual-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--border);}
.annual-row:last-child{border-bottom:none;}
.annual-cat{font-size:13px;}
.annual-vals{display:flex;gap:12px;align-items:center;}
.annual-val{font-size:12px;font-family:var(--mono);color:var(--text2);min-width:80px;text-align:right;}
.annual-total{font-weight:500;color:var(--text);}
.annual-header{display:grid;grid-template-columns:1fr repeat(4,80px);gap:4px;padding:6px 0;border-bottom:.5px solid var(--border2);margin-bottom:4px;}
.annual-header span{font-size:10px;color:var(--text3);text-align:right;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
.annual-header span:first-child{text-align:left;}
.annual-section-title{font-size:12px;font-weight:500;margin:12px 0 6px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}

/* FILTER */
.filter-bar{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;border:.5px solid var(--border2);background:none;color:var(--text2);white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0;}
.chip.active{background:var(--accent);color:#fff;border-color:transparent;}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.form-group label{font-size:12px;color:var(--text2);font-weight:500;}
.form-group input,.form-group select{padding:11px 12px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:15px;font-family:var(--font);width:100%;-webkit-appearance:none;}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* SHEET */
.sheet-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;}
.sheet-overlay.open{display:block;}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:18px 18px calc(var(--safe-bottom)+16px);z-index:101;max-height:90%;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
.sheet-title{font-size:17px;font-weight:500;margin-bottom:14px;}

/* FAB */
.fab{position:absolute;bottom:calc(var(--safe-bottom)+68px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:40;transition:transform .15s;}
.fab:active{transform:scale(.92);}
.fab.hidden{display:none;}

/* UPLOAD */
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:26px 16px;text-align:center;cursor:pointer;}
.upload-zone input{display:none;}
.upload-icon{font-size:30px;margin-bottom:7px;}
.upload-text{font-size:13px;color:var(--text2);}
.upload-text strong{color:var(--text);display:block;margin-bottom:3px;}
.ai-bar{padding:10px;border-radius:var(--radius-sm);margin-top:9px;font-size:13px;display:flex;align-items:center;gap:7px;}
.ai-bar.loading{background:var(--hogar-bg);color:var(--hogar);}
.ai-bar.success{background:var(--green-bg);color:var(--green);}
.ai-bar.error{background:var(--red-bg);color:var(--red);}
.spinner{width:14px;height:14px;border:2px solid rgba(24,95,165,.3);border-top-color:var(--hogar);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.ext-box{background:var(--surface2);border-radius:var(--radius-sm);padding:11px;margin-top:9px;}
.ext-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;}
.ext-row span:first-child{color:var(--text3);}
.ext-row span:last-child{font-weight:500;}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;}

/* SECTION HEADER */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:18px;font-weight:500;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-row">
      <div><h1>Gastos</h1><div class="topbar-sub" id="top-date"></div></div>
      <button class="btn btn-sm" onclick="exportCSV()">↓ CSV</button>
    </div>
  </div>

  <!-- NUCLEO FILTER -->
  <div class="nucleo-bar">
    <button class="nucleo-chip todos active" onclick="setNucleo('todos',this)">Todos</button>
    <button class="nucleo-chip hogar" onclick="setNucleo('hogar',this)">🏠 Hogar</button>
    <button class="nucleo-chip autos" onclick="setNucleo('autos',this)">🚗 Autos</button>
    <button class="nucleo-chip hijos" onclick="setNucleo('hijos',this)">👨‍👩‍👧 Hijos</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="section active">
      <div class="nucleo-cards" id="dash-nucleo"></div>
      <div class="metrics" id="dash-metrics"></div>
      <div class="card">
        <div class="card-title">Evolución mensual</div>
        <div class="chart-wrap"><canvas id="chart-main"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Próximos vencimientos</div>
        <div id="dash-upcoming"></div>
      </div>
    </div>

    <!-- GASTOS -->
    <div id="sec-gastos" class="section">
      <div class="sec-header"><span class="sec-title">Gastos</span></div>
      <div class="filter-bar" id="filter-estado"></div>
      <div id="list-gastos" class="item-list"></div>
    </div>

    <!-- CALENDARIO -->
    <div id="sec-calendario" class="section">
      <div class="card">
        <div class="cal-nav">
          <button class="cal-arrow" onclick="calPrev()">‹</button>
          <span class="cal-month" id="cal-label"></span>
          <button class="cal-arrow" onclick="calNext()">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-detail" id="cal-detail"></div>
      </div>
    </div>

    <!-- RESUMEN ANUAL -->
    <div id="sec-anual" class="section">
      <div class="sec-header">
        <span class="sec-title">Resumen anual</span>
        <select id="year-select" onchange="renderAnual()" style="padding:5px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;"></select>
      </div>
      <div id="anual-content"></div>
    </div>

    <!-- IMPORTAR -->
    <div id="sec-importar" class="section">
      <div class="sec-header"><span class="sec-title">Importar PDF</span></div>
      <div class="card">
        <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">Subí un PDF y Claude extrae los datos automáticamente.</p>
        <label class="upload-zone">
          <input type="file" id="pdf-input" accept="application/pdf" onchange="handleFile(event)">
          <div class="upload-icon">📄</div>
          <div class="upload-text"><strong>Tocar para seleccionar PDF</strong>Facturas, resúmenes, seguros, etc.</div>
        </label>
        <div id="ai-status" style="display:none"></div>
        <div id="ext-box" style="display:none"></div>
        <div id="confirm-form" style="display:none"></div>
      </div>
    </div>

  </div><!-- /content -->

  <button class="fab hidden" id="fab" onclick="openSheet()">+</button>

  <nav class="navbar">
    <button class="nav-btn active" onclick="goTo('dashboard',this)"><span class="nav-icon">⊞</span>Inicio</button>
    <button class="nav-btn" onclick="goTo('gastos',this)"><span class="nav-icon">≡</span>Gastos</button>
    <button class="nav-btn" onclick="goTo('calendario',this)"><span class="nav-icon">◫</span>Calendario</button>
    <button class="nav-btn" onclick="goTo('anual',this)"><span class="nav-icon">∑</span>Anual</button>
    <button class="nav-btn" onclick="goTo('importar',this)"><span class="nav-icon">↑</span>Importar</button>
  </nav>

  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet"><div class="sheet-handle"></div><div id="sheet-body"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SK = 'gastos-v3';

const NUCLEOS = { hogar:'🏠 Hogar', autos:'🚗 Autos', hijos:'👨‍👩‍👧 Hijos' };

  'Farmacia':'💊','Combustible':'⛽','Patente':'📋','Seguro Auto':'🛡️',

const NC = {

// ─── DATA ────────────────────────────────────────────────────────────────────
const EDENOR = [
  {nucleo:'hogar',cat:'Luz',nombre:'Edenor Ene 2025 (Liq.1)',fecha:'2025-01-31',monto:70307.22,estado:'pagado',tipo:'servicio'},

function filtered(extraFilters={}){
  return db.filter(x=>{

    return true;
  });

// ─── FORMAT ──────────────────────────────────────────────────────────────────
function fm(n){ return '$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmk(n){ return n>=1000000?'$'+(n/1000000).toFixed(1)+'M':n>=1000?'$'+Math.round(n/1000)+'k':'$'+Math.round(n); }
function fd(d){ if(!d)return'—'; const[y,m,dd]=d.split('-'); return`${dd}/${m}/${y}`; }
function ml(d){ const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; const p=d.split('-'); return ms[+p[1]-1]+' '+p[0]; }
const MES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function bdg(s){ const m={pendiente:'badge-pending',pagado:'badge-paid',vencido:'badge-overdue'}; return`<span class="badge ${m[s]||'badge-pending'}">${s||'pendiente'}</span>`; }
function nbdg(n){ return`<span class="badge badge-${n}">${NUCLEOS[n]||n}</span>`; }

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(sel){
  document.getElementById('cal-label').textContent=MES[calM]+' '+calY;
  const fd0=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),off=(fd0+6)%7;
  const today=new Date(),dm={};
  filtered().forEach(x=>{
    if(!x.fecha)return;
    const[y,m,d]=x.fecha.split('-').map(Number);
    if(y===calY&&m-1===calM){if(!dm[d])dm[d]=[];dm[d].push(x);}
  });
  let h=['L','M','X','J','V','S','D'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<off;i++) h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const isT=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d;
    const items=dm[d]||[];
    let cls='cal-day'+(isT?' today':'')+(items.length?' has-items':'');
    const dots=items.slice(0,2).map(x=>`<div class="cal-dot ${NC[x.nucleo]?.dot||''} ${x.estado==='pagado'?'pagado':''}">${x.nombre.slice(0,8)}</div>`).join('');
    h+=`<div class="${cls}"${items.length?` onclick="renderCal(${d})"`:''}>
      <div class="cal-day-num">${d}</div>${dots}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
  const det=document.getElementById('cal-detail');
  if(sel&&dm[sel]){
    const items=dm[sel],tot=items.reduce((s,x)=>s+Number(x.monto||0),0);
    det.innerHTML=`<div class="cal-detail-label">${sel} de ${MES[calM]} · ${fm(tot)}</div>
    <div class="item-list">${items.map(x=>`<div class="item">
      <div class="item-icon" style="background:${NC[x.nucleo]?.bg};color:${NC[x.nucleo]?.fg};">${CAT_ICONS[x.cat]||'📄'}</div>
      <div class="item-info"><div class="item-name">${x.nombre}</div><div class="item-meta">${x.cat}</div></div>
      <div class="item-right">${bdg(x.estado)}<div class="item-amount">${fm(x.monto)}</div>
      ${x.estado!=='pagado'?`<button class="btn btn-sm" onclick="markPaid('${x.id}');renderCal(${sel})">Pagar</button>`:''}
      </div></div>`).join('')}</div>`;
  } else { det.innerHTML=''; }
}

// ─── ANNUAL ──────────────────────────────────────────────────────────────────
function renderAnual(){
  const sel=document.getElementById('year-select');
  const year=sel.value;
  const items=filtered({year});

  const totAnual=items.reduce((s,x)=>s+Number(x.monto||0),0);
  const byNucleo={hogar:0,autos:0,hijos:0};
  items.forEach(x=>{if(byNucleo[x.nucleo]!==undefined)byNucleo[x.nucleo]+=Number(x.monto||0);});

  // By category
  const byCat={};
  items.forEach(x=>{
    const k=x.nucleo+'|'+x.cat;
    if(!byCat[k]) byCat[k]={nucleo:x.nucleo,cat:x.cat,total:0,count:0};
    byCat[k].total+=Number(x.monto||0);
    byCat[k].count++;
  });

  // By month
  const byMonth={};
  for(let m=1;m<=12;m++) byMonth[m]=0;
  items.forEach(x=>{if(x.fecha){const m=parseInt(x.fecha.split('-')[1]);byMonth[m]=(byMonth[m]||0)+Number(x.monto||0);}});

  const MS2=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  let html=`
    <div class="nucleo-cards" style="margin-bottom:10px;">
      <div class="nucleo-card hogar"><div class="nucleo-card-label">🏠 Hogar</div><div class="nucleo-card-value">${fmk(byNucleo.hogar)}</div></div>
      <div class="nucleo-card autos"><div class="nucleo-card-label">🚗 Autos</div><div class="nucleo-card-value">${fmk(byNucleo.autos)}</div></div>
      <div class="nucleo-card hijos"><div class="nucleo-card-label">👨‍👩‍👧 Hijos</div><div class="nucleo-card-value">${fmk(byNucleo.hijos)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Total ${year}</div>
      <div style="font-size:28px;font-weight:500;font-family:var(--mono);letter-spacing:-1px;margin-bottom:4px;">${fm(totAnual)}</div>
      <div style="font-size:12px;color:var(--text3);">${items.length} registros · Promedio mensual ${fm(totAnual/12)}</div>
    </div>`;

  // Monthly breakdown
  html+=`<div class="card"><div class="card-title">Por mes</div>`;
  for(let m=1;m<=12;m++){
    const v=byMonth[m]||0;
    const pct=totAnual>0?Math.round(v/totAnual*100):0;
    html+=`<div class="annual-row">
      <span class="annual-cat">${MS2[m-1]}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:var(--hogar);border-radius:2px;"></div>
        </div>
        <span style="font-size:13px;font-family:var(--mono);min-width:80px;text-align:right;">${v>0?fm(v):'—'}</span>
      </div>
    </div>`;
  }
  html+=`</div>`;

  // By category grouped by nucleo
  ['hogar','autos','hijos'].forEach(n=>{
    const cats=Object.values(byCat).filter(x=>x.nucleo===n).sort((a,b)=>b.total-a.total);
    if(!cats.length)return;
    html+=`<div class="card"><div class="card-title" style="color:${NC[n].fg};">${NUCLEOS[n]}</div>`;
    cats.forEach(c=>{
      const pct=byNucleo[n]>0?Math.round(c.total/byNucleo[n]*100):0;
      html+=`<div class="annual-row">
        <span class="annual-cat">${CAT_ICONS[c.cat]||'📄'} ${c.cat}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--text3);">${pct}%</span>
          <span style="font-size:13px;font-family:var(--mono);min-width:90px;text-align:right;font-weight:500;">${fm(c.total)}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });

  document.getElementById('anual-content').innerHTML=html;
}

// ─── PDF / AI ────────────────────────────────────────────────────────────────
function handleFile(e){const f=e.target.files[0];if(f)processPDF(f);}
function setAI(msg,type=''){
  const el=document.getElementById('ai-status');
  el.style.display='flex';el.className='ai-bar '+(type||'');
  el.innerHTML=type==='loading'?`<div class="spinner"></div><span>${msg}</span>`:`<span>${msg}</span>`;
}
async function processPDF(file){
  document.getElementById('ext-box').style.display='none';
  document.getElementById('confirm-form').style.display='none';
  setAI('Leyendo PDF...','loading');
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    setAI('Claude analizando...','loading');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
        {type:'text',text:`Analizá este documento (factura, resumen de tarjeta, seguro, impuesto, etc.) y extraé los datos clave.
Respondé ÚNICAMENTE con JSON válido sin texto adicional:
{
  "nucleo": "hogar" | "autos" | "hijos",
  "cat": una de estas categorías exactas: Luz, Gas, Agua, Internet, TV Streaming, Spotify/Música, Impuesto Municipal, Impuesto Provincial, Seguro del Hogar, Vigilancia / Monitoreo, Empleada Doméstica, Alquiler, Expensas, Reparaciones, Supermercado, Farmacia, Combustible, Patente, Seguro Auto, Service / Mecánico, Peajes, Lavadero, Multas, Colegio, Deportes, Clases de Música, Salud / Médico, Ropa Niños, Útiles / Libros, Cumpleaños / Juguetes, Tarjeta de Crédito, Otro,
  "nombre": "nombre descriptivo del documento",
  "monto": número total a pagar,
  "fecha_vencimiento": "YYYY-MM-DD" o null,
  "tipo": "servicio" | "tarjeta" | "gasto",
  "notas": "info adicional" o null
}`}
      ]}]})});
    const res=await resp.json();
    if(res.error)throw new Error(res.error.message);
    const ex=JSON.parse(res.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    setAI('Datos extraídos correctamente','success');
    showExtracted(ex);
  }catch(err){setAI('Error: '+err.message,'error');}
}

function showExtracted(ex){
  document.getElementById('ext-box').style.display='block';
  document.getElementById('ext-box').innerHTML=`<div class="ext-box">
    <div class="ext-row"><span>Núcleo</span><span>${NUCLEOS[ex.nucleo]||ex.nucleo||'—'}</span></div>

    <div class="ext-row"><span>Nombre</span><span>${ex.nombre||'—'}</span></div>
    <div class="ext-row"><span>Monto</span><span>${ex.monto?fm(ex.monto):'—'}</span></div>
    <div class="ext-row"><span>Vencimiento</span><span>${ex.fecha_vencimiento?fd(ex.fecha_vencimiento):'—'}</span></div>
  </div>`;
  const allCatOpts=(n,sel)=>CATEGORIAS[n||'hogar'].map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');
  document.getElementById('confirm-form').style.display='block';
  document.getElementById('confirm-form').innerHTML=`<div style="margin-top:10px;">
    <div class="form-grid2">
      <div class="form-group"><label>Núcleo</label>
        <select id="cf-nucleo" onchange="document.getElementById('cf-cat').innerHTML=this.value==='hogar'?'${CATEGORIAS.hogar.map(c=>`<option>${c}</option>`).join('')}':this.value==='autos'?'${CATEGORIAS.autos.map(c=>`<option>${c}</option>`).join('')}':'${CATEGORIAS.hijos.map(c=>`<option>${c}</option>`).join('')}'">
          <option value="hogar"${ex.nucleo==='hogar'?' selected':''}>🏠 Hogar</option>
          <option value="autos"${ex.nucleo==='autos'?' selected':''}>🚗 Autos</option>
          <option value="hijos"${ex.nucleo==='hijos'?' selected':''}>👨‍👩‍👧 Hijos</option>
        </select>
      </div>
      <div class="form-group"><label>Categoría</label><select id="cf-cat">${allCatOpts(ex.nucleo,ex.cat)}</select></div>
    </div>
    <div class="form-group"><label>Nombre</label><input id="cf-nombre" value="${ex.nombre||''}"/></div>
    <div class="form-grid2">
      <div class="form-group"><label>Monto</label><input id="cf-monto" type="number" value="${ex.monto||''}"/></div>
      <div class="form-group"><label>Vencimiento</label><input id="cf-fecha" type="date" value="${ex.fecha_vencimiento||''}"/></div>
    </div>
    <div class="form-group"><label>Estado</label>
      <select id="cf-estado"><option value="pendiente">Pendiente</option><option value="pagado">Pagado</option></select>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveExtracted()">Guardar gasto</button>
  </div>`;
}

function saveExtracted(){
  const nombre=document.getElementById('cf-nombre')?.value?.trim();
  const monto=document.getElementById('cf-monto')?.value;
  if(!nombre||!monto){alert('Completá nombre y monto.');return;}
  db.push({
    id:genId(),
    nucleo:document.getElementById('cf-nucleo').value,
    cat:document.getElementById('cf-cat').value,
    nombre,monto:parseFloat(monto),
    fecha:document.getElementById('cf-fecha')?.value||'',
    estado:document.getElementById('cf-estado')?.value||'pendiente',
    tipo:'servicio'
  });
  saveDb();populateYears();
  document.getElementById('ext-box').style.display='none';
  document.getElementById('confirm-form').style.display='none';
  document.getElementById('pdf-input').value='';
  setAI('¡Guardado correctamente!','success');
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Núcleo','Categoría','Nombre','Monto','Fecha','Estado','Tipo']];
  filtered().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||'')).forEach(x=>{
    rows.push([NUCLEOS[x.nucleo]||x.nucleo, x.cat, x.nombre, x.monto, x.fecha, x.estado, x.tipo||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`gastos_${nucleo}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}

calY=now.getFullYear();calM=now.getMonth();
document.getElementById('top-date').textContent=now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
populateYears();
renderDash();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
